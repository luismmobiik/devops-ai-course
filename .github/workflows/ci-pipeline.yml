name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  issues: write

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-frontend

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Security check
      run: |
        echo "Scanning for hardcoded secrets..."
        PATTERN='AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|DB_PASSWORD|JWT_SECRET|password\s*=|eval\('
        if grep -rEin --include='*.ts' --include='*.js' --include='*.json' --include='*.html' --exclude='*.spec.ts' --exclude-dir=node_modules "$PATTERN" devops-frontend/src/; then
          echo "::error::Hardcoded secrets or dangerous patterns detected!"
          exit 1
        fi
        echo "No issues found."
      working-directory: .

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: devops-frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npx ng lint --no-interactive 2>/dev/null || echo "Linter not configured — skipping"

    - name: Run tests
      run: npx ng test --no-watch --browsers=ChromeHeadless

    - name: Build
      run: npx ng build --configuration production

    - name: Create issue on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const sha = context.sha.substring(0, 7);
          const message = context.payload.head_commit?.message || 'N/A';
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `CI Pipeline failed — ${sha}`,
            body: [
              '## CI Pipeline Failure',
              '',
              `**Commit:** \`${context.sha}\``,
              `**Message:** ${message}`,
              `**Branch:** ${context.ref}`,
              `**Author:** ${context.actor}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n'),
            labels: ['bug', 'ci-failure']
          });
