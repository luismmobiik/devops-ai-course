name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-frontend

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Security check
      uses: trufflesecurity/trufflehog@v3
      with:
        extra_args: --only-verified --fail

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: devops-frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npx ng lint --no-interactive 2>/dev/null || echo "Linter not configured — skipping"

    - name: Run tests
      run: npx ng test --no-watch --browsers=ChromeHeadless

    - name: Build
      run: npx ng build --configuration production
