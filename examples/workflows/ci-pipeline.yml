name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: devops-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: devops-frontend/node_modules
          key: node-modules-${{ hashFiles('devops-frontend/package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: devops-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: devops-frontend/node_modules
          key: node-modules-${{ hashFiles('devops-frontend/package-lock.json') }}

      - name: Lint check
        run: npx ng lint --no-interactive 2>/dev/null || echo "Linter not configured yet — skipping"

  test:
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: devops-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: devops-frontend/node_modules
          key: node-modules-${{ hashFiles('devops-frontend/package-lock.json') }}

      - name: Run tests with coverage
        run: npx ng test --no-watch --code-coverage --browsers=ChromeHeadless

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: devops-frontend/coverage/
          retention-days: 5

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: devops-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: devops-frontend/node_modules
          key: node-modules-${{ hashFiles('devops-frontend/package-lock.json') }}

      - name: Build production
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: devops-frontend/dist/
          retention-days: 5
